title: ProvSQL
subtitle: Provenance for PostgreSQL
# Default meta / og description for pages without their own; kept in
# the 110-160 character range recommended for search snippets.
description: >-
  ProvSQL adds semiring provenance and uncertainty management to
  PostgreSQL: probabilities, Shapley values, semiring evaluations.
  Free and open-source (MIT).
url: "https://provsql.org"
baseurl: ""
repository: "PierreSenellart/provsql"
github_username: PierreSenellart

# Site author (meta name="author") and identity for the theme's
# schema.html JSON-LD (without social.name it emits a degenerate
# {"@type": "Person", "name": null}).
author:
  name: Pierre Senellart
  url: https://pierre.senellart.com/
social:
  name: Pierre Senellart
  links:
    - https://github.com/PierreSenellart
    - https://pierre.senellart.com/

# Default social-card image (og:image / twitter:image in the theme's
# seo.html): a 1200x630 crop of the circuit-mode screenshot, the size
# social platforms recommend. Override per page with `header.og_image`
# in the front matter.
og_image: /assets/images/social-card.png
og_image_alt: "ProvSQL Studio rendering the provenance circuit of a SQL query result"

theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "provsql"
logo: "/assets/images/logo.png"

include:
  - _bibliography
  - .htaccess

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-scholar

# jekyll-scholar configuration
scholar:
  style: acm-siggraph
  bibliography: references.bib
  bibliography_template: bib
  sort_by: year, month
  order: descending
  group_by: year
  group_order: descending
  bibliography_list_tag: ul

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  silence_deprecations: [import, global-builtin]

# Page defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

# Site footer links
footer:
  links:
    - label: "Source"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/PierreSenellart/provsql"

# Preserve externally-generated docs through Jekyll rebuilds (populated by
# `make website`; plugin does the initial copy, keep_files prevents deletion)
keep_files: [docs, doxygen-sql, doxygen-c]

# Exclude from Jekyll processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  # Pre-built docs copied verbatim by passthrough_docs.rb plugin
  - docs/
  - doxygen-sql/
  - doxygen-c/
