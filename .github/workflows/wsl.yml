name: Windows Subsystem for Linux

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'doc/**'
      - 'website/**'
      - 'branding/**'
      - 'docker/**'
      - 'studio/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'META.json'
      - 'release.sh'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/build_and_test.yml'
      - '.github/workflows/macos.yml'
      - '.github/workflows/pgxn.yml'
      - '.github/workflows/studio.yml'
      - '.github/workflows/studio-release.yml'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'website/**'
      - 'branding/**'
      - 'docker/**'
      - 'studio/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'META.json'
      - 'release.sh'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/build_and_test.yml'
      - '.github/workflows/macos.yml'
      - '.github/workflows/pgxn.yml'
      - '.github/workflows/studio.yml'
      - '.github/workflows/studio-release.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: wsl-bash {0}
    steps:
      - uses: Vampire/setup-wsl@v7.0.0
      - run: sed -i '/bullseye-backports/d' /etc/apt/sources.list # Temporary fix for https://github.com/Vampire/setup-wsl/issues/76
      - run: apt update
      - run: apt -y install postgresql libgraph-easy-perl libboost-dev libboost-serialization-dev unzip zlib1g-dev libgmp-dev git build-essential postgresql-server-dev-all
      # d4 / dsharp / weightmc are exercised by the Linux matrix; the WSL
      # job's signal is "does the extension build and run under WSL", so
      # tests that need those binaries skip cleanly here.
      # Full history + tags are needed so Makefile.internal's
      # `git describe --tags` resolves LATEST_RELEASE and the
      # extension_upgrade regression test runs.
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0
      - run: make -j$(nproc) && make tdkc && make provsql_migrate_mmap && make install
      - run: echo "shared_preload_libraries = 'provsql'" >> /etc/postgresql/*/*/postgresql.conf
      - run: service postgresql restart
      - run: perl -i -pe 's/\r//g unless /\\set ECHO none/' test/expected/*.out
      # tool_search_path stages a `\! printf ... > /tmp/.../graph-easy` stub
      # via psql's shell-escape. WSL's CRLF-translated .sql leaves a stray
      # \r in the redirect target, so /bin/sh tries to create the file at
      # "/tmp/provsql_tsp_test/graph-easy\r" and fails. The test is
      # validating PATH override behavior, which is environment-agnostic
      # and already exercised on Linux/macOS — skip it here.
      - run: "sed -i '/^test: tool_search_path/d' test/schedule"
      - run: pg_isready -t 30
      - run: sudo -u postgres make installcheck || bash -c 'cat /tmp/tmp.provsql*/regression.diffs; false'
