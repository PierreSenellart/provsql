name: Studio

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ['**']
    paths:
      - 'studio/**'
      - 'sql/provsql.common.sql'
      - 'sql/provsql.14.sql'
      - '.github/workflows/studio.yml'
      # Sources of the generated example notebooks (the notebooks job):
      # annotated user-guide chapters and the setup.sql they splice in.
      - 'doc/source/user/*.rst'
      - 'doc/tutorial/setup.sql'
      - 'doc/casestudy*/setup.sql'
  pull_request:
    paths:
      - 'studio/**'
      - 'sql/provsql.common.sql'
      - 'sql/provsql.14.sql'
      - '.github/workflows/studio.yml'
      - 'doc/source/user/*.rst'
      - 'doc/tutorial/setup.sql'
      - 'doc/casestudy*/setup.sql'
  workflow_dispatch:

jobs:
  lint:
    name: ✨ ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check .
        working-directory: studio

  notebooks:
    name: 📓 example-notebook drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The committed studio/provsql_studio/notebooks/*.ipynb are GENERATED
      # from the annotated user-guide .rst (+ spliced setup.sql) by
      # studio/scripts/rst2nb.py; they are committed because the PyPI wheel
      # ships them. This job regenerates and fails on any diff, so the
      # notebooks cannot silently drift from the documentation.
      #
      # pandoc is PINNED to the version the notebooks were generated with:
      # its rst->gfm output changes across releases, so a runner-default
      # pandoc would flag cosmetic prose differences as drift. When
      # upgrading pandoc locally, regenerate all notebooks, commit, and
      # bump this pin.
      - name: Install pinned pandoc
        run: |
          curl -fsSL -o /tmp/pandoc.deb \
            https://github.com/jgm/pandoc/releases/download/3.7.0.2/pandoc-3.7.0.2-1-amd64.deb
          sudo dpkg -i /tmp/pandoc.deb
          pandoc --version | head -1
      - run: python3 studio/scripts/rst2nb.py
      - name: Fail on drift
        run: |
          git diff --exit-code -- studio/provsql_studio/notebooks || {
            echo '::error::example notebooks are stale: run `make notebooks` (or `make docs`) and commit studio/provsql_studio/notebooks/'; exit 1; }

  package:
    name: 📦 sdist + wheel + --help
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build
        working-directory: studio
      # Install into a clean venv to confirm the wheel carries everything
      # the entry point needs (no implicit dep on the editable checkout).
      - run: python -m venv /tmp/wheel-venv
      - run: /tmp/wheel-venv/bin/pip install studio/dist/*.whl
      - run: /tmp/wheel-venv/bin/provsql-studio --help

  build:
    name: 🔨 build PG${{ matrix.pg }}
    needs: lint
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    strategy:
      fail-fast: false
      matrix:
        pg: [14, 15, 16]
    steps:
      - run: pg-start ${{ matrix.pg }} libboost-dev libboost-serialization-dev
      - uses: actions/checkout@v6
      - run: make -j$(nproc)
      # Stage what test/e2e need (.so, .control, sql/*) under /tmp/inst
      # via DESTDIR, then tar it. We tar because `actions/upload-artifact@v4`
      # uses zip internally and drops Unix file modes, which can strip the
      # executable bit from provsql.so.
      - run: |
          make install DESTDIR=/tmp/inst
          tar -czf /tmp/provsql-build.tar.gz -C /tmp/inst .
      - uses: actions/upload-artifact@v7
        with:
          name: provsql-build-pg${{ matrix.pg }}
          path: /tmp/provsql-build.tar.gz
          retention-days: 1

  test:
    name: 🧪 pytest Py${{ matrix.python }} × PG${{ matrix.pg }}
    needs: build
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
        pg: [14, 15, 16]
    steps:
      - run: pg-start ${{ matrix.pg }} libboost-dev libboost-serialization-dev graphviz
      - run: pg_dropcluster ${{ matrix.pg }} main
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v8
        with:
          name: provsql-build-pg${{ matrix.pg }}
          path: /tmp/build
      - run: tar -xzf /tmp/build/provsql-build.tar.gz -C /
      - run: echo "shared_preload_libraries = 'provsql'" >> /etc/postgresql/${{ matrix.pg }}/test/postgresql.conf
      - run: service postgresql restart
      - run: pg_isready -t 30
      # `setup-python` exports `pythonLocation` but doesn't add its bin/ to
      # PATH inside a container, so call pip / pytest via `python -m` to
      # bind to the matrix-selected interpreter.
      - run: python -m pip install -e "./studio[test]"
      # Unit suite only -- the Playwright e2e tests run in the `e2e` job
      # below, which adds the chromium download + system deps step. Keeping
      # them separate makes triage easier when one set fails and the other
      # doesn't.
      # tests/web (the browser/PGlite build e2e) needs the assembled doc-root
      # + a headless Chromium; it runs in the wasm workflow, not this matrix.
      - run: python -m pytest studio/tests --ignore=studio/tests/e2e --ignore=studio/tests/web
        env:
          PGUSER: postgres

  e2e:
    name: 🎭 Playwright Py${{ matrix.python }} × PG${{ matrix.pg }}
    needs: build
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
        pg: [14, 15, 16]
    steps:
      - run: pg-start ${{ matrix.pg }} libboost-dev libboost-serialization-dev graphviz
      - run: pg_dropcluster ${{ matrix.pg }} main
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v8
        with:
          name: provsql-build-pg${{ matrix.pg }}
          path: /tmp/build
      - run: tar -xzf /tmp/build/provsql-build.tar.gz -C /
      - run: echo "shared_preload_libraries = 'provsql'" >> /etc/postgresql/${{ matrix.pg }}/test/postgresql.conf
      - run: service postgresql restart
      - run: pg_isready -t 30
      - run: python -m pip install -e "./studio[test]"
      - name: Get Playwright version
        id: pw-version
        shell: bash
        run: |
          PW=$(python -c "from importlib.metadata import version; print(version('playwright'))")
          echo "version=$PW" >> "$GITHUB_OUTPUT"
      # Browser binary is ~112 MiB; cache it keyed on the Playwright
      # release so an upgrade invalidates the cache automatically.
      # System libs from `--with-deps` are installed apt-side every run,
      # but on a cache hit Playwright skips the chromium download itself.
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: /root/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
      - run: python -m playwright install --with-deps chromium
      # --reruns: a busy shared runner sporadically blows the 90s
      # Page.goto timeout on one cell of the matrix; retry the failed
      # test once before failing the job. A genuine failure still fails
      # (both attempts), it just reports a few seconds later.
      - run: python -m pytest studio/tests/e2e --reruns 1 --reruns-delay 5
        env:
          PGUSER: postgres
