name: WASM / in-process store

# Two jobs:
#  - inprocess-store: cheap, per-PR. Builds the extension with the
#    single-process store forced on and runs a single-session functional smoke
#    -- the model the in-process store is built for (PGlite: one backend, the
#    extension loaded at CREATE EXTENSION, no preload). The full pg_regress
#    suite is deliberately NOT used: it is multi-backend (one backend per test
#    file) and would need the hook preloaded, but the in-process build is not
#    preloadable. Thorough runtime coverage lives in the wasm job's e2e.
#  - wasm: heavy, opt-in (workflow_dispatch). Reproduces the full
#    browser/PGlite build (provsql.so + a matched pglite.wasm), runs the
#    headless Node smoke test, then assembles the doc-root and runs the
#    browser (Playwright) e2e.

on:
  push:
    paths: ['src/**', 'sql/**', 'wasm/**', '.github/workflows/wasm.yml']
  pull_request:
    paths: ['src/**', 'sql/**', 'wasm/**', '.github/workflows/wasm.yml']
  workflow_dispatch:

jobs:
  inprocess-store:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    name: in-process store (single-session smoke)
    runs-on: ubuntu-latest
    # Same PostgreSQL-install path as the main build_and_test Linux job: the
    # pgxn-tools image + pg-start handle the PGDG apt setup cleanly (a raw
    # apt-get install hits a postgresql-common version conflict on the runner).
    container: pgxn/pgxn-tools
    steps:
      - run: pg-start 17 libboost-dev libboost-serialization-dev unzip uuid-dev
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Build with PROVSQL_INPROCESS_STORE and install
        run: make -j$(nproc) PG_CPPFLAGS='-DPROVSQL_INPROCESS_STORE -O0 -g' && make install
      # Exercise the store the way PGlite does: a single psql session where
      # CREATE EXTENSION loads provsql and installs the planner hook (no
      # preload). Covers add_provenance, provenance() rewriting, the circuit
      # store, and in-process probability (which builds + compiles the circuit).
      # ON_ERROR_STOP fails on any error; the grep pins NY = 1 - 0.5^2 = 0.75.
      - name: Single-session functional smoke
        run: |
          out=$(PGUSER=postgres psql -X -v ON_ERROR_STOP=1 -d postgres <<'SQL'
          CREATE EXTENSION provsql CASCADE;
          SET search_path TO public, provsql;
          CREATE TABLE t(id int, city text);
          INSERT INTO t VALUES (1, 'NY'), (2, 'NY'), (3, 'Paris');
          SELECT add_provenance('t');
          SELECT set_prob(provenance(), 0.5) FROM t;
          SELECT city, count(*) FROM t GROUP BY city ORDER BY city;
          SELECT round(probability_evaluate(provenance())::numeric, 4) AS p
            FROM (SELECT provenance() FROM t WHERE city = 'NY' GROUP BY city) q;
          SQL
          )
          echo "$out"
          echo "$out" | grep -q '0.7500' || { echo "unexpected probability"; exit 1; }

  # Heavy and opt-in. Reproduces the browser build end to end; the exact
  # PGlite-core build invocation may need first-run tuning (it offloads to
  # PGlite's own build, which pins submodules + the builder image).
  wasm:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      IMG: docker.io/electricsql/pglite-builder:3.1.74-5-postgis-libicu-min
    steps:
      - uses: actions/checkout@v6
        with: { path: provsql }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Generate the extension SQL (native make)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-all libboost-dev uuid-dev
          make -C provsql sql/provsql.sql
      - name: Build the WASM Postgres tree + extension + matched pglite
        run: |
          docker pull "$IMG"
          git clone --recurse-submodules https://github.com/electric-sql/pglite
          cd pglite && git submodule update --init --depth 1 postgres-pglite
          PG=$PWD/postgres-pglite
          docker run --rm -w "$PG" -v "$PG:$PG" -v "$PG/dist:/pglite" "$IMG" ./build-pglite.sh
          mkdir -p "$PG/provsql-wasm"
          cp -r "$GITHUB_WORKSPACE/provsql/src" "$PG/provsql-wasm/src"
          cp "$GITHUB_WORKSPACE"/provsql/sql/provsql--*.sql "$PG/provsql-wasm/"
          cp "$GITHUB_WORKSPACE/provsql/provsql.control" "$PG/provsql-wasm/"
          cp "$GITHUB_WORKSPACE"/provsql/wasm/build-extension.sh \
             "$GITHUB_WORKSPACE"/provsql/wasm/build-pglite.sh "$PG/"
          docker run --rm -w "$PG" -v "$PG:$PG" -v "$PG/dist:/pglite" \
            -v /usr/include/boost:/boostinc/boost:ro "$IMG" ./build-extension.sh
          docker run --rm -w "$PG" -v "$PG:$PG" -v "$PG/dist:/pglite" "$IMG" ./build-pglite.sh
      - name: Build the PGlite TS package + headless smoke test
        run: |
          cd pglite
          PG=$PWD/postgres-pglite
          cp "$PG"/dist/bin/pglite.wasm "$PG"/dist/bin/pglite.data "$PG"/dist/bin/pglite.js packages/pglite/release/
          cp "$PG"/dist/extensions/*.tar.gz packages/pglite/release/ 2>/dev/null || true
          corepack pnpm install --filter "@electric-sql/pglite..."
          corepack pnpm --filter @electric-sql/pglite-utils run build
          corepack pnpm --filter @electric-sql/pglite      run build:js
          PGLITE_DIST=$PWD/packages/pglite/dist \
          PROVSQL_TARBALL=$PG/provsql-wasm/provsql.tar.gz \
            node "$GITHUB_WORKSPACE/provsql/wasm/test-node.mjs"
      - name: Assemble the browser doc-root
        run: |
          "$GITHUB_WORKSPACE/provsql/studio/web/build.sh" \
            --pglite "$GITHUB_WORKSPACE/pglite/packages/pglite/dist" \
            --provsql "$GITHUB_WORKSPACE/pglite/postgres-pglite/provsql-wasm/provsql.tar.gz"
      - name: Browser e2e (headless Chromium, JSPI)
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest pytest-playwright
          python3 -m playwright install --with-deps chromium
          cd "$GITHUB_WORKSPACE/provsql/studio"
          python3 -m pytest tests/web/ -q
      - name: Upload the assembled browser build
        uses: actions/upload-artifact@v4
        with:
          name: provsql-studio-web
          path: provsql/studio/web
          retention-days: 7
