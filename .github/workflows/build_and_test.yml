name: Linux

on:
  push:
    branches: ['**']
    tags: ['v*']
    paths-ignore:
      - 'doc/**'
      - 'website/**'
      - 'branding/**'
      - '*.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'release.sh'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/macos.yml'
      - '.github/workflows/wsl.yml'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'website/**'
      - 'branding/**'
      - '*.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'release.sh'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/docs.yml'
      - '.github/workflows/macos.yml'
      - '.github/workflows/wsl.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip tests on tag pushes: the same commit was already tested on master
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        pg: [18, 17, 16, 15, 14, 13, 12, 11, 10]
    name: 🐘 PostgreSQL ${{ matrix.pg }}
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - run: pg-start ${{ matrix.pg }} libgraph-easy-perl libboost-dev libboost-serialization-dev unzip zlib1g-dev libgmp-dev
      - run: pg_dropcluster ${{ matrix.pg }} main
      - run: git clone https://github.com/crillab/d4.git && cd d4 && make && mv d4 /usr/local/bin && cd ..
      - run: git clone https://github.com/QuMuLab/dsharp.git && cd dsharp && mv Makefile_gmp Makefile && make && mv dsharp /usr/local/bin && cd ..
      - run: git clone https://bitbucket.org/kuldeepmeel/weightmc/src/master/ weightmc && cd weightmc/wmc-src && ./configure && make && mv weightmc /usr/local/bin && cd ../..
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0
      - run: make && make tdkc && make install
      - run: echo "shared_preload_libraries = 'provsql'" >> /etc/postgresql/${{ matrix.pg }}/test/postgresql.conf
      - run: service postgresql restart
      - run: pg_isready -t 30
      - run: make installcheck PGUSER=postgres || bash -c "shopt -s nullglob; cat /tmp/tmp.provsql*/regression.diffs && for i in /tmp/provsql*; do echo $i && cat $i; done; false"

  docker:
    needs: test
    # always() is needed so this condition is evaluated even when
    # the test job is skipped (tag pushes); see
    # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/using-jobs-in-a-workflow
    if: |
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')) &&
      github.repository == 'PierreSenellart/provsql'
    environment: master_branch
    runs-on: ubuntu-latest
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "provsql_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "provsql_version=dev" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: inriavalda
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          file: docker/Dockerfile
          push: true
          tags: >-
            inriavalda/provsql:latest${{
              steps.version.outputs.provsql_version != 'dev'
              && format(',inriavalda/provsql:{0}', steps.version.outputs.provsql_version)
              || ''
            }}
          build-args: |
            PROVSQL_VERSION=${{ steps.version.outputs.provsql_version }}
