name: Documentation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ['**']
    paths-ignore:
      - 'docker/**'
      - 'website/**'
      - 'studio/**'
      - 'wasm/**'
      - 'test/bench/**'
      - '.github/workflows/build_and_test.yml'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/macos.yml'
      - '.github/workflows/pgxn.yml'
      - '.github/workflows/studio.yml'
      - '.github/workflows/studio-release.yml'
      - '.github/workflows/wsl.yml'
      - '.github/workflows/wasm.yml'
      - 'release.sh'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'META.json'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  pull_request:
    paths-ignore:
      - 'docker/**'
      - 'website/**'
      - 'studio/**'
      - 'wasm/**'
      - 'test/bench/**'
      - '.github/workflows/build_and_test.yml'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/macos.yml'
      - '.github/workflows/pgxn.yml'
      - '.github/workflows/studio.yml'
      - '.github/workflows/studio-release.yml'
      - '.github/workflows/wsl.yml'
      - '.github/workflows/wasm.yml'
      - 'release.sh'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'META.json'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-latest
    container: pgxn/pgxn-tools
    steps:
      - uses: actions/checkout@v6
      - run: apt update
      - run: apt -y install python3-breathe python3-sphinx-rtd-theme python3-sphinx-copybutton python3-pybtex python3-sphinxcontrib.bibtex graphviz wget postgresql-server-dev-all
      - name: Cache Doxygen
        id: cache-doxygen
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/doxygen
          key: doxygen-1.16.1-${{ runner.os }}
      - if: steps.cache-doxygen.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz
          tar xzf doxygen-1.16.1.linux.bin.tar.gz
          cp doxygen-1.16.1/bin/doxygen /usr/local/bin/
      - run: make docs
